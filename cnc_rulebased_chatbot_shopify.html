    },

    sendQuick: function(text) {
      document.getElementById('cnc-rb-qr').innerHTML = '';
      document.getElementById('cnc-rb-input').value = text;
      this.send();
    },

    handleKey: function(e) {
      if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); this.send(); }
    },

    autoResize: function(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight,80)+'px';
    },

    send: function() {
      var input = document.getElementById('cnc-rb-input');
      var text = input.value.trim();
      if (!text) return;
      input.value = ''; input.style.height = 'auto';
      document.getElementById('cnc-rb-qr').innerHTML = '';
      this.addUserMsg(text);
      if (messageCount === 0) this.startSession();
      messageCount++;

      // Find response
      var lower = text.toLowerCase();
      var match = null;
      for (var i=0; i<RESPONSES.length; i++) {
        if (RESPONSES[i].triggers.some(function(t){ return lower.includes(t); })) {
          match = RESPONSES[i]; break;
        }
      }
      if (!match) match = DEFAULT_REPLY;

      // Simulate typing delay
      var typing = document.getElementById('cnc-rb-typing');
      typing.style.display = 'block';
      var self = this;
      var delay = Math.min(600 + text.length * 10, 1800);
      setTimeout(function() {
        typing.style.display = 'none';
        self.addBotMsg(match.reply);
        if (match.quickReplies && match.quickReplies.length) self.showQR(match.quickReplies);
        self.logMsg(text, match.reply);
      }, delay);
    },

    startSession: function() {
      sessionId = 'rb_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
      this.fb('PUT', '/chatSessions/'+sessionId+'.json', {
        id: sessionId, startTime: new Date().toISOString(), status: 'active',
        totalMessages: 0, lastMessage: null, endTime: null, topics: [],
        leadScore: 0, notes: '', flagged: false,
        referrer: document.referrer||'direct', page: window.location.pathname,
        userAgent: navigator.userAgent, screenSize: screen.width+'x'+screen.height,
        language: navigator.language, chatType: 'rule-based'
      });
    },

    logMsg: function(q, a) {
      if (!sessionId) return;
      this.fb('POST', '/chatSessions/'+sessionId+'/messages.json', { q:q, a:a.slice(0,400), t:new Date().toISOString() });

      var combined = (q+' '+a).toLowerCase();
      Object.keys(KEYWORDS).forEach(function(cat) {
        if (KEYWORDS[cat].some(function(k){ return combined.includes(k); }) && sessionTopics.indexOf(cat)<0) sessionTopics.push(cat);
      });

      var sc = 0;
      if (/price|cost|rate/.test(combined)) sc+=3;
      if (/order|buy|quantity/.test(combined)) sc+=5;
      if (/whatsapp|call|phone/.test(combined)) sc+=4;
      if (/dealer|distributor/.test(combined)) sc+=4;
      if (messageCount>3) sc+=2;

      this.fb('PATCH', '/chatSessions/'+sessionId+'.json', {
        lastMessage: new Date().toISOString(), totalMessages: messageCount,
        topics: sessionTopics, leadScore: sc, status: 'active'
      });
    },

    fb: function(method, path, data) {
      var xhr = new XMLHttpRequest();
      xhr.open(method, DB+path, true);
      xhr.setRequestHeader('Content-Type','application/json');
      xhr.send(JSON.stringify(data));
    },

    now: function() {
      return new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'});
    }
  };

  setTimeout(function() {
    if (!isOpen) document.getElementById('cnc-rb-badge').style.display = 'flex';
  }, 4000);

  window.addEventListener('beforeunload', function() {
    if (!sessionId) return;
    navigator.sendBeacon(DB+'/chatSessions/'+sessionId+'.json', JSON.stringify({ status:'ended', endTime: new Date().toISOString() }));
  });

})();
</script>
