  <div id="cnce-notify">1</div>
</button>

<div id="cnce-win">
  <div id="cnce-hd">
    <div class="cnce-hd-top">
      <div class="cnce-logo-wrap">
        <span class="cnce-logo-text">CNC</span>
      </div>
      <div class="cnce-hd-info">
        <div class="cnce-hd-name">CNC Electric Pakistan</div>
        <div class="cnce-hd-status">
          <span class="cnce-hd-sdot"></span>
          <span class="cnce-hd-stext">AI Assistant · Always available</span>
        </div>
      </div>
    </div>
    <div class="cnce-warranty-tag">
      🛡️ 5-Year Replacement Warranty on all Breakers
    </div>
  </div>

  <div id="cnce-msgs"></div>
  <div id="cnce-typing"><div class="cnce-typing-bub"><div class="cnce-dot"></div><div class="cnce-dot"></div><div class="cnce-dot"></div></div></div>
  <div id="cnce-qr"></div>
  <div id="cnce-err"></div>

  <div id="cnce-ia">
    <textarea id="cnce-inp" placeholder="Ask about products, prices, specs…" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();cnceChat.send();}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
    <button id="cnce-snd" onclick="cnceChat.send()" aria-label="Send">
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
        <path d="M15 8.5L2 2l3 6.5-3 6.5 13-6.5z" fill="white"/>
      </svg>

`;
document.body.appendChild(root);

// ── PARTICLES ─────────────────────────────────────────────────────
function spawnParticle() {
  var container = document.getElementById('cnce-particles');
  if (!container || !isOpen) return;
  var p = document.createElement('div');
  p.className = 'cnce-particle';
  var size = Math.random() * 4 + 2;
  p.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(Math.random()*80+20)+'px;bottom:0;animation-duration:'+(Math.random()*2+1.5)+'s;animation-delay:0s;opacity:'+(Math.random()*0.5+0.3);
  container.appendChild(p);
  setTimeout(function(){ p.remove(); }, 3500);
}
setInterval(function(){ if(isOpen) spawnParticle(); }, 600);

// ── PUBLIC API ────────────────────────────────────────────────────
window.cnceChat = {
  toggle: function() {
    isOpen = !isOpen;
    var bubble = document.getElementById('cnce-bubble');
    var win = document.getElementById('cnce-win');
    bubble.classList.toggle('open', isOpen);
    document.getElementById('cnce-notify').style.display = 'none';
    if (isOpen) {
      win.style.display = 'flex';
      setTimeout(function(){ win.classList.add('visible'); }, 10);
      if (firstOpen) { firstOpen=false; this.welcome(); }
      setTimeout(function(){ var i=document.getElementById('cnce-inp'); if(i) i.focus(); }, 280);
    } else {
      win.classList.remove('visible');
      setTimeout(function(){ win.style.display='none'; }, 280);
    }
  },

  welcome: function() {
    var el = document.getElementById('cnce-msgs');
    el.innerHTML = '';
    this.botMsg(CFG.welcome);
    showQR(['Product Prices 💰','Solar Bundles ☀️','WiFi Breakers 📱','ATS / Transfer Switch','5-Year Warranty 🛡️','Contact & Support']);
  },

  send: function() {
    var inp = document.getElementById('cnce-inp');
    var txt = inp.value.trim();
    if (!txt || isTyping) return;
    inp.value = ''; inp.style.height = 'auto';
    document.getElementById('cnce-qr').innerHTML = '';
    document.getElementById('cnce-err').style.display = 'none';
    this.userMsg(txt);
    if (!msgCount) startSession();
    msgCount++;
    callAPI(txt);
  },

  botMsg: function(text) {
    var el = document.getElementById('cnce-msgs');
    var d = document.createElement('div');
    d.className = 'cnce-msg bot';
    d.innerHTML = '<div class="cnce-bubble-msg">'+fmt(text)+'</div><div class="cnce-msg-time">'+now()+'</div>';
    el.appendChild(d); scrollDown();
  },

  userMsg: function(text) {
    var el = document.getElementById('cnce-msgs');
    var d = document.createElement('div');
    d.className = 'cnce-msg usr';
    d.innerHTML = '<div class="cnce-bubble-msg">'+esc(text)+'</div><div class="cnce-msg-time">'+now()+'</div>';
    el.appendChild(d); scrollDown();
  }
};

function showQR(arr) {
  var el = document.getElementById('cnce-qr');
  el.innerHTML = arr.map(function(r){
    return '<button class="cnce-qr-btn" onclick="document.getElementById(\'cnce-inp\').value=\''+r.replace(/'/g,"\\'").replace(/[⚡☀️📱🛡️💰]/g,'')+'\';cnceChat.send()">'+r+'</button>';
  }).join('');
}

function callAPI(text) {
  var key = localStorage.getItem('cnc_api_key') || CFG.apiKey;
  if (!key) { showErr('No API key set. Please add your key in the CNC Analytics dashboard → Settings.'); return; }
  history.push({role:'user', content:text});
  setTyping(true);

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:CFG.model, max_tokens:CFG.maxTokens,
      system:SYSTEM, messages:history
    })
  })
  .then(function(r){
    if(!r.ok) return r.json().then(function(e){ throw {s:r.status,m:(e.error&&e.error.message)||'API error '+r.status}; });
    return r.json();
  })
  .then(function(d){
    setTyping(false);
    var reply = d.content&&d.content[0]&&d.content[0].text;
    if(!reply) throw {m:'Empty response'};
    history.push({role:'assistant',content:reply});
    cnceChat.botMsg(reply);
    logMsg(text, reply);
    // Show contextual quick replies after response
    setTimeout(function(){ showContextQR(text+' '+reply); }, 300);
  })
  .catch(function(e){
    setTyping(false);
    var m = e.m||e.message||'Unknown error';
    if(e.s===401||/auth|invalid|key/i.test(m)) showErr('Invalid API key. Please check your key in dashboard Settings.');
    else if(e.s===429) showErr('Rate limit — please wait a moment and try again.');
    else showErr('Connection error: '+m);
  });
}

function showContextQR(combined) {
  var lower = combined.toLowerCase();
  var qrs = [];
  if(/price|cost|rate|how much/i.test(lower)) qrs = ['View All Products','Place Order','WhatsApp Us'];
  else if(/solar|pv|photovoltaic/i.test(lower)) qrs = ['Solar DB Bundles','DC Breakers','MC4 Connectors'];
  else if(/ats|transfer|generator/i.test(lower)) qrs = ['ATS Prices','WiFi Breakers','Contact Support'];
  else if(/wifi|smart|remote/i.test(lower)) qrs = ['WiFi Breaker Prices','VA Protection','Place Order'];
  else if(/order|buy|purchase/i.test(lower)) qrs = ['Visit Website','WhatsApp Order','Track My Order'];
  else if(/warranty|guarantee/i.test(lower)) qrs = ['Contact Support','Product Details','Order Now'];
  else qrs = ['Product Catalogue','Get a Quote','WhatsApp Support'];
  if(qrs.length) showQR(qrs);
}

function setTyping(on) {
  isTyping = on;
  document.getElementById('cnce-snd').disabled = on;
  document.getElementById('cnce-typing').style.display = on?'block':'none';
  if(on) scrollDown();
}

function showErr(m) {
  var el=document.getElementById('cnce-err');
  el.innerHTML='⚠ '+esc(m);
  el.style.display='block';
  scrollDown();
}

function scrollDown() {
  var el=document.getElementById('cnce-msgs');
  setTimeout(function(){ el.scrollTop=el.scrollHeight; },50);
}

function fmt(t) {
  return esc(t)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code style="background:rgba(255,107,0,0.15);padding:1px 5px;border-radius:3px;font-size:12px;color:#ff9a3c">$1</code>')
    .replace(/\n/g,'<br>');
}
function esc(s){ return(s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function now(){ return new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'}); }

// ── FIREBASE LOGGING ──────────────────────────────────────────────
function startSession() {
  sessionId='cs_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
  topics=[];
  fb('PUT','/chatSessions/'+sessionId+'.json',{
    id:sessionId, startTime:new Date().toISOString(), status:'active',
    totalMessages:0, lastMessage:null, endTime:null, topics:[],
    leadScore:0, notes:'', flagged:false,
    referrer:document.referrer||'cncelectric.pk',
    page:window.location.pathname,
    userAgent:navigator.userAgent,
    screenSize:screen.width+'x'+screen.height,
    language:navigator.language,
    chatType:'claude-ai-v2'
  });
}

function logMsg(q,a) {
  if(!sessionId) return;
  fb('POST','/chatSessions/'+sessionId+'/messages.json',{q:q,a:a,t:new Date().toISOString()});
  var combined=(q+' '+a).toLowerCase();
  Object.keys(KEYWORDS).forEach(function(cat){
    if(KEYWORDS[cat].some(function(k){return combined.includes(k);})&&topics.indexOf(cat)<0) topics.push(cat);
  });
  var sc=0;
  if(/price|cost|rate|how much|kitna/.test(combined)) sc+=3;
  if(/order|buy|purchase|quantity|bulk/.test(combined)) sc+=5;
  if(/whatsapp|call|phone|contact|number/.test(combined)) sc+=4;
  if(/dealer|distributor|reseller/.test(combined)) sc+=4;
  if(msgCount>3) sc+=2;
  if(msgCount>6) sc+=2;
  fb('PATCH','/chatSessions/'+sessionId+'.json',{
    lastMessage:new Date().toISOString(),
    totalMessages:msgCount,
    topics:topics,
    leadScore:sc,
    status:'active'
  });
  clearTimeout(inactTimer);
  inactTimer=setTimeout(function(){
    fb('PATCH','/chatSessions/'+sessionId+'.json',{status:'ended',endTime:new Date().toISOString()});
  },5*60*1000);
}

function fb(method,path,data){
  var xhr=new XMLHttpRequest();
  xhr.open(method,CFG.db+path,true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.send(JSON.stringify(data));
}

window.addEventListener('beforeunload',function(){
  if(!sessionId) return;
  navigator.sendBeacon(CFG.db+'/chatSessions/'+sessionId+'.json',JSON.stringify({status:'ended',endTime:new Date().toISOString()}));
});

// Show notification badge after 4s
setTimeout(function(){
  if(!isOpen){
    var n=document.getElementById('cnce-notify');
    if(n) n.style.display='flex';
  }
},4000);

})();
</script>
