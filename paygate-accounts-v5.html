// ═══ AI TEXT EXTRACTION ═══
// Parses pasted bank SMS/message text to extract payment details
// Works offline (regex) + optional Claude API for complex messages

function extractFromText(text){
  var result={amount:0,bank:"",account:"",payer:"",ref:"",date:"",raw:text,confidence:"low",method:"regex"};
  if(!text)return result;
  
  // Amount: Rs. / PKR / Rs followed by number
  var amtM=text.match(/(?:Rs\.?|PKR|Rs)\s*([\d,]+(?:\.\d+)?)/i);
  if(amtM){result.amount=parseFloat(amtM[1].replace(/,/g,""));result.confidence="medium"}
  
  // Bank detection
  var bankMap={"habib":"BAH","alhabib":"BAH","bahl":"BAH","alfalah":"BAFL","bafl":"BAFL","meezan":"Meezan","mzn":"Meezan","soneri":"Soneri","hbl":"HBL","ubl":"UBL","mcb":"MCB","allied":"Allied","jazzcash":"JazzCash","easypaisa":"Easypaisa"};
  var tl=text.toLowerCase();
  for(var k in bankMap){if(tl.indexOf(k)>=0){result.bank=bankMap[k];break}}
  
  // Account number
  var accM=text.match(/(?:A\/C|AC|account|acct)[:\s#]*([\d*\-X]+)/i);
  if(accM)result.account=accM[1];
  
  // Also try IBAN
  var ibanM=text.match(/PK\d{2}[A-Z]{4}\d{16}/);
  if(ibanM)result.account=ibanM[0];
  
  // Sender/Payer name
  var payerM=text.match(/(?:from|sender|by|deposited by|received from)[:\s]+([A-Za-z][A-Za-z\s\.]+?)(?:\s*[\(\.]|\s+(?:MBL|HBL|via|on|AC|A\/C)|$)/i);
  if(payerM)result.payer=payerM[1].trim();
  
  // Reference
  var refM=text.match(/(?:Ref|TID|Txn|Transaction)[:\s#]*([\w\-]+)/i);
  if(refM)result.ref=refM[1];
  
  // Date
  var dateM=text.match(/(\d{1,2}[\-\/]\w{3}[\-\/]\d{2,4}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4})/);
  if(dateM)result.date=dateM[1];
  
  // If we got amount + bank, confidence is good
  if(result.amount>0 && result.bank)result.confidence="high";
  else if(result.amount>0)result.confidence="medium";
  
  return result;
}

// Claude API extraction (optional - needs API key in settings)
function extractWithAI(text,imageBase64,callback){
  var apiKey=pgSettings.claude_api_key||"";
  if(!apiKey){callback(extractFromText(text));return}
  
  var messages=[{role:"user",content:[]}];
  
  if(imageBase64){
    messages[0].content.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:imageBase64}});
  }
  
  var prompt="Extract payment details from this "+(imageBase64?"image":"text")+".\nReturn ONLY a JSON object with: {amount, bank, account, payer, ref, date}\nNo explanation, just JSON.\n\n";
  if(text)prompt+="Text: "+text;
  messages[0].content.push({type:"text",text:prompt});
  
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:messages})
  }).then(function(r){return r.json()}).then(function(d){
    try{
      var t=d.content[0].text;
      var j=JSON.parse(t.replace(/```json|```/g,"").trim());
      j.confidence="high";j.method="claude-ai";j.raw=text;
      callback(j);
    }catch(e){callback(extractFromText(text))}
  }).catch(function(){callback(extractFromText(text))});
}

  var bk="1101",rv="1201",ent=e.ent||"CST";

  if(e.typ==="cash")bk="1151";
  var amt=Number(e.amt||0);
  journals.push({id:"JV-"+String(journals.length+1).padStart(4,"0"),date:new Date().toISOString().slice(0,10),ref:e.id||"",nar:(e.cust||"Customer")+" - "+(e.typ||"payment")+" via PayGate",ent:ent,status:amt>100000?"pending":"posted",by:amt>100000?"":"paygate",lines:[{a:bk,d:amt,c:0,m:e.typ||"bank"},{a:rv,d:0,c:amt,m:e.cust||""}]});
  // Track bank account
  if(e.sender_account){
    bankTracker.push({dealer:e.cust,account:e.sender_account,bank:e.sender_bank||"",amount:amt,date:new Date().toISOString().slice(0,10),known:COMPANY_BANKS.some(function(b){return e.sender_account.indexOf(b.code)>=0})});

function PKR(v){return v?"PKR "+Math.round(v).toLocaleString():"--"}
function SH(v){if(!v)return"--";var a=Math.abs(v);return a>=1e7?(v/1e7).toFixed(1)+"Cr":a>=1e5?(v/1e5).toFixed(1)+"L":a>=1e3?(v/1e3).toFixed(0)+"K":v.toLocaleString()}
function AN(c){var f=COA.find(function(a){return a.code===c});return f?f.name:c}

function calc(){
  var b={};COA.forEach(function(a){b[a.code]={code:a.code,name:a.name,type:a.type,parent:a.parent,normal:a.normal,dr:0,cr:0,bal:0}});
  journals.filter(function(j){return j.status==="posted"}).forEach(function(j){j.lines.forEach(function(l){if(b[l.a]){b[l.a].dr+=l.d;b[l.a].cr+=l.c}})});
  var keys=Object.keys(b);for(var i=0;i<keys.length;i++){var a=b[keys[i]];a.bal=a.normal==="debit"?a.dr-a.cr:a.normal==="credit"?a.cr-a.dr:0}
  return b;
}

function saveSettings(){try{localStorage.setItem("pg_settings",JSON.stringify(pgSettings))}catch(e){}}
function testAlert(){showAlert(1,{cust:"Test Customer",amt:150000,ent:"CNC"});playAlertSound()}
function doExtract(){
  var txt=document.getElementById("pasteMsg");if(!txt||!txt.value.trim()){alert("Paste a message first");return}
  var resultDiv=document.getElementById("extractResult");
  resultDiv.innerHTML='<div class="ai-box"><span class="ai-tag">EXTRACTING...</span></div>';
  extractWithAI(txt.value.trim(),null,function(r){
    var h='<div class="ai-box"><span class="ai-tag">AI EXTRACTED</span> <span class="pill pill-'+(r.confidence==="high"?"g":r.confidence==="medium"?"y":"r")+'">'+r.confidence+'</span> <span class="pill pill-b">'+r.method+'</span>';
    h+='<div class="extract-grid" style="margin-top:8px"><div><div class="ek">Amount</div><div class="ev grn" style="font-size:16px">PKR '+(r.amount?r.amount.toLocaleString():"--")+'</div></div>';
    h+='<div><div class="ek">Bank</div><div class="ev">'+(r.bank||"--")+'</div></div>';
    h+='<div><div class="ek">Account</div><div class="ev">'+(r.account||"--")+'</div></div>';
    h+='<div><div class="ek">Payer</div><div class="ev">'+(r.payer||"--")+'</div></div>';
    h+='<div><div class="ek">Reference</div><div class="ev">'+(r.ref||"--")+'</div></div>';
    h+='<div><div class="ek">Date</div><div class="ev">'+(r.date||"--")+'</div></div></div>';
    if(r.amount>0)h+='<div style="margin-top:8px"><button class="btn btn-g" onclick="addExtracted()">Add as Payment</button></div>';
    h+='</div>';resultDiv.innerHTML=h;window._lastExtracted=r;
  });
}
function addExtracted(){
  var r=window._lastExtracted;if(!r||!r.amount)return;
  var entries=[];try{entries=JSON.parse(localStorage.getItem("pg_e")||"[]")}catch(e){}
  var now=new Date();
  entries.unshift({id:"PG-"+Date.now(),cust:r.payer||"Unknown",amt:r.amount,ent:"CST",typ:"bank_transfer",note:"From message: "+(r.raw||"").slice(0,100),source_text:r.raw||"",sender_account:r.account||"",sender_bank:r.bank||"",ts:now.toISOString(),date:now.toLocaleDateString("en-GB",{day:"2-digit",month:"short"}),time:now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",hour12:true}),sync:false,journaled:false});
  try{localStorage.setItem("pg_e",JSON.stringify(entries.slice(0,500)))}catch(e){}
  document.getElementById("pasteMsg").value="";
  document.getElementById("extractResult").innerHTML='<div class="ai-box" style="background:#f0fdf4;border-color:#86efac"><b style="color:#16a34a">Added!</b> PKR '+r.amount.toLocaleString()+'</div>';
  window._lastExtracted=null;setTimeout(render,1500);
}
function handlePasteImage(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();reader.onload=function(e){
    var base64=e.target.result.split(",")[1];
    var resultDiv=document.getElementById("extractResult");
    resultDiv.innerHTML='<div class="ai-box"><span class="ai-tag">READING IMAGE...</span></div>';
    extractWithAI("Extract payment details from this receipt",base64,function(r){
      window._lastExtracted=r;
      var h='<div class="ai-box"><span class="ai-tag">FROM IMAGE</span><div class="extract-grid" style="margin-top:8px"><div><div class="ek">Amount</div><div class="ev grn">PKR '+(r.amount?r.amount.toLocaleString():"--")+'</div></div><div><div class="ek">Payer</div><div class="ev">'+(r.payer||"--")+'</div></div></div>';
      if(r.amount>0)h+='<button class="btn btn-g" style="margin-top:8px" onclick="addExtracted()">Add Entry</button>';
      h+='</div>';resultDiv.innerHTML=h;
    });
  };reader.readAsDataURL(file);
}
function showDealerDetail(name){
  var pgRaw=[];try{pgRaw=JSON.parse(localStorage.getItem("pg_e")||"[]")}catch(e){}
  var entries=pgRaw.filter(function(e){return e.cust===name});
  var total=0;entries.forEach(function(e){total+=Number(e.amt||0)});
  var accounts={};entries.forEach(function(e){if(e.sender_account){if(!accounts[e.sender_account])accounts[e.sender_account]={acct:e.sender_account,bank:e.sender_bank||"",total:0,count:0};accounts[e.sender_account].total+=Number(e.amt||0);accounts[e.sender_account].count++}});
  var acctList=Object.values(accounts);
  var m='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h2>'+name+'</h2><button class="modal-close" onclick="closeModal()">x</button></div><div class="modal-body">';
  m+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">';
  m+='<div style="padding:10px;border-radius:8px;background:#f0fdf4;text-align:center"><div style="font-size:10px;color:#888">Total</div><div style="font-size:18px;font-weight:700;font-family:monospace;color:#16a34a">PKR '+total.toLocaleString()+'</div></div>';
  m+='<div style="padding:10px;border-radius:8px;background:#eff6ff;text-align:center"><div style="font-size:10px;color:#888">Payments</div><div style="font-size:18px;font-weight:700">'+entries.length+'</div></div>';
  m+='<div style="padding:10px;border-radius:8px;background:#faf5ff;text-align:center"><div style="font-size:10px;color:#888">Accounts</div><div style="font-size:18px;font-weight:700">'+acctList.length+'</div></div></div>';
  if(acctList.length){m+='<div style="font-size:12px;font-weight:700;margin-bottom:6px">Sending Accounts</div><table><thead><tr><th>Account</th><th>Bank</th><th class="r">Count</th><th class="r">Total</th></tr></thead><tbody>';acctList.forEach(function(a){m+='<tr><td class="mono">'+a.acct+'</td><td>'+a.bank+'</td><td class="r">'+a.count+'</td><td class="r mono fw6">'+a.total.toLocaleString()+'</td></tr>'});m+='</tbody></table>'}
  m+='<div style="font-size:12px;font-weight:700;margin:14px 0 6px">Payments</div><table><thead><tr><th>Date</th><th>Type</th><th class="r">Amount</th><th>Status</th></tr></thead><tbody>';
  entries.forEach(function(e){m+='<tr><td style="font-size:11px">'+(e.date||"")+" "+(e.time||"")+'</td><td>'+(e.typ||"")+'</td><td class="r mono fw6 grn">'+Number(e.amt||0).toLocaleString()+'</td><td>'+(e.journaled?"Posted":"Pending")+'</td></tr>'});
  m+='</tbody></table></div></div></div>';
  var d=document.createElement("div");d.id="personModal";d.innerHTML=m;document.body.appendChild(d);
}
