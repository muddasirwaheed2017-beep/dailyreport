.kpi .l{font-size:10px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.kpi .v{font-size:19px;font-weight:700;margin-top:2px;font-family:monospace}

document.addEventListener("click",function(e){

// ═══ AI TEXT EXTRACTION ═══
function extractFromText(text){
  var r={amount:0,bank:"",account:"",payer:"",ref:"",date:"",raw:text,confidence:"low",method:"regex"};
  if(!text)return r;
  var amtM=text.match(/(?:Rs\.?|PKR|Rs)\s*([\d,]+(?:\.\d+)?)/i);
  if(amtM){r.amount=parseFloat(amtM[1].replace(/,/g,""));r.confidence="medium"}
  var bankMap={"habib":"BAH","alhabib":"BAH","bahl":"BAH","alfalah":"BAFL","bafl":"BAFL","meezan":"Meezan","soneri":"Soneri","hbl":"HBL","ubl":"UBL","mcb":"MCB","jazzcash":"JazzCash","easypaisa":"Easypaisa"};
  var tl=text.toLowerCase();for(var k in bankMap){if(tl.indexOf(k)>=0){r.bank=bankMap[k];break}}
  var accM=text.match(/(?:A\/C|AC|account)[:\s#]*([\d*\-X]+)/i);if(accM)r.account=accM[1];
  var payerM=text.match(/(?:from|sender|by|received from)[:\s]+([A-Za-z][A-Za-z\s\.]+?)(?:\s*[\(\.]|\s+(?:MBL|HBL|via|on|AC)|$)/i);if(payerM)r.payer=payerM[1].trim();
  var refM=text.match(/(?:Ref|TID|Txn)[:\s#]*([\w\-]+)/i);if(refM)r.ref=refM[1];
  var dateM=text.match(/(\d{1,2}[\-\/]\w{3}[\-\/]\d{2,4}|\d{1,2}[\-\/]\d{1,2}[\-\/]\d{2,4})/);if(dateM)r.date=dateM[1];
  if(r.amount>0&&r.bank)r.confidence="high";
  return r;
}
function extractWithAI(text,imgB64,cb){
  var key=pgSettings.claude_api_key||"";
  if(!key){cb(extractFromText(text));return}
  var msgs=[{role:"user",content:[]}];
  if(imgB64)msgs[0].content.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:imgB64}});
  msgs[0].content.push({type:"text",text:"Extract payment details. Return ONLY JSON: {amount,bank,account,payer,ref,date}\n\n"+text});
  fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:msgs})}).then(function(r){return r.json()}).then(function(d){try{var j=JSON.parse(d.content[0].text.replace(/```json|```/g,"").trim());j.confidence="high";j.method="claude-ai";j.raw=text;cb(j)}catch(e){cb(extractFromText(text))}}).catch(function(){cb(extractFromText(text))});
}

// ═══ PAYMENT REVIEW DETAIL ═══

// ═══════════════════════════════════════════════
// FRAUD & RISK DETECTION ENGINE
// ═══════════════════════════════════════════════

function runFraudChecks(entry, idx, allEntries){
  var flags = [];
  var amt = Number(entry.amt || 0);
  var ts = entry.ts ? new Date(entry.ts) : new Date();
  var ai = entry.ai_extracted || {};
  
  // 1. DUPLICATE PHOTO — hash comparison
  if(entry.photo){
    var photoSig = entry.photo.length + "_" + entry.photo.slice(-50);
    allEntries.forEach(function(other, oi){
      if(oi !== idx && other.photo){
        var otherSig = other.photo.length + "_" + other.photo.slice(-50);
        if(photoSig === otherSig){
          flags.push({level:"critical",code:"DUP_PHOTO",msg:"DUPLICATE RECEIPT — same photo used in " + (other.id||"PG-???"),detail:"This exact receipt image was already submitted in entry " + other.id + " on " + (other.date||"?")});
        }
      }
    });
  }
  
  // 2. DUPLICATE AMOUNT — same customer, same amount within 24hrs
  allEntries.forEach(function(other, oi){
    if(oi !== idx && other.cust === entry.cust && Math.abs(Number(other.amt||0) - amt) < 10){
      var otherTs = other.ts ? new Date(other.ts) : null;
      if(otherTs && Math.abs(ts - otherTs) < 86400000){
        var hrs = Math.round(Math.abs(ts - otherTs) / 3600000);
        flags.push({level:"warning",code:"DUP_AMOUNT",msg:"POSSIBLE DUPLICATE — PKR " + amt.toLocaleString() + " also in " + (other.id||"?"),detail:"Same customer (" + entry.cust + ") same amount, " + hrs + " hours apart. Entry: " + other.id});
      }
    }
  });
  
  
  // 2b. SAME DEPOSIT BY DIFFERENT SALESPEOPLE
  allEntries.forEach(function(other, oi){
    if(oi !== idx && other.cust === entry.cust && Math.abs(Number(other.amt||0) - amt) < 100){
      var sameSubmitter = (other.submitted_by||"") === (entry.submitted_by||"");
      if(!sameSubmitter && (other.submitted_by||"unknown") !== (entry.submitted_by||"unknown")){
        flags.push({level:"critical",code:"DUAL_SUBMIT",msg:"DUAL SUBMISSION \u2014 also posted by " + (other.submitted_by||"another person") + " as " + (other.id||"?"),detail:"Two different salespeople submitted the same payment. " + (entry.submitted_by||"Person A") + " posted this entry, but " + (other.submitted_by||"Person B") + " also posted " + (other.id||"?") + " for " + (other.cust||"same customer") + " PKR " + Number(other.amt||0).toLocaleString() + ". Only ONE should be approved."});
      }
    }
  });

  // 3. OLD RECEIPT — AI date doesn't match today
  if(ai.date){
    var receiptDateStr = ai.date || "";
    var todayStr = new Date().toISOString().slice(0,10);
    var submissionStr = (entry.ts||"").slice(0,10);
    // Simple check: if receipt date string doesn't contain today's day
    var todayDay = new Date().getDate();
    var todayMonth = new Date().toLocaleString("en",{month:"short"});
    if(receiptDateStr.indexOf(String(todayDay)) < 0 || (receiptDateStr.toLowerCase().indexOf(todayMonth.toLowerCase()) < 0 && receiptDateStr.indexOf(String(new Date().getMonth()+1)) < 0)){
      flags.push({level:"warning",code:"OLD_RECEIPT",msg:"OLD RECEIPT — photo date: " + receiptDateStr + ", submitted: " + (entry.date||"today"),detail:"The receipt/screenshot shows a different date than when it was submitted. Could be a recycled receipt."});
    }
  }
  
  // 4. STALE DEPOSIT — entry timestamp vs today
  if(entry.ts){
    var entryDate = new Date(entry.ts);
    var now = new Date();
    var daysDiff = Math.floor((now - entryDate) / 86400000);
    if(daysDiff >= 1 && !entry.journaled){
      flags.push({level:"info",code:"STALE",msg:"STALE — submitted " + daysDiff + " day(s) ago, still pending",detail:"This payment was submitted on " + (entry.date||"?") + " but not yet processed."});
    }
  }
  
  // 5. TID ALREADY EXISTS — check for duplicate transaction IDs
  if(ai.ref || ai.tid){
    var tid = ai.ref || ai.tid;
    allEntries.forEach(function(other, oi){
      if(oi !== idx){
        var otherAi = other.ai_extracted || {};
        if((otherAi.ref && otherAi.ref === tid) || (otherAi.tid && otherAi.tid === tid)){
          flags.push({level:"critical",code:"DUP_TID",msg:"DUPLICATE TID — " + tid + " already in " + (other.id||"?"),detail:"Transaction ID " + tid + " was already used in entry " + other.id + ". This is the same bank transaction being submitted again."});
        }
      }
    });
  }
  
  
  // 5b. BANK VERIFICATION ALREADY CONSUMED
  if(entry.bank_feed_ref || (ai.ref || ai.tid)){
    var thisRef = entry.bank_feed_ref || ai.ref || ai.tid || "";
    if(thisRef){
      allEntries.forEach(function(other, oi){
        if(oi !== idx && other.journaled){
          var otherRef = other.bank_feed_ref || "";
          var otherAi = other.ai_extracted || {};
          var otherTid = otherRef || otherAi.ref || otherAi.tid || "";
          if(otherTid && otherTid === thisRef){
            flags.push({level:"critical",code:"VERIFICATION_USED",msg:"BANK VERIFICATION ALREADY USED \u2014 consumed by " + (other.id||"?"),detail:"The bank transaction " + thisRef + " was already used to verify and POST entry " + other.id + " (" + (other.cust||"?") + " PKR " + Number(other.amt||0).toLocaleString() + "). This same bank confirmation CANNOT be used twice. REJECT this entry."});
          }
        }
      });
    }
  }

  // 6. AMOUNT MISMATCH (from V7)
  if(ai.amount && amt > 0 && Math.abs(ai.amount - amt) > 10){
    flags.push({level:"critical",code:"AMT_MISMATCH",msg:"AMOUNT MISMATCH — Claimed PKR " + amt.toLocaleString() + " vs Receipt PKR " + ai.amount.toLocaleString(),detail:"Difference of PKR " + Math.abs(amt - ai.amount).toLocaleString() + ". The salesperson claimed a different amount than what the receipt shows."});
  }
  
  // 7. SENDER ACCOUNT INTELLIGENCE
  if(ai.account){
    var acctHistory=[];
    var seenByThisDealer=false;
    var seenByOtherDealer=false;
    var otherDealerNames=[];
    
    allEntries.forEach(function(other, oi){
      if(oi===idx)return;
      var otherAcct=other.sender_account||(other.ai_extracted&&other.ai_extracted.account)||"";
      if(otherAcct===ai.account){
        acctHistory.push(other);
        if(other.cust===entry.cust){
          seenByThisDealer=true;
        } else {
          seenByOtherDealer=true;
          if(otherDealerNames.indexOf(other.cust)<0)otherDealerNames.push(other.cust);
        }
      }
    });
    
    if(seenByOtherDealer){
      // CRITICAL: This account was used by a DIFFERENT dealer before
      flags.push({level:"critical",code:"CROSS_DEALER_ACCT",msg:"CROSS-DEALER ACCOUNT \u2014 " + ai.account + " belongs to: " + otherDealerNames.join(", "),detail:"Account " + ai.account + " (" + (ai.payer||"?") + ") was previously used to deposit for: " + otherDealerNames.join(", ") + ". Now being used for " + (entry.cust||"?") + ". This could mean: (1) shared account between dealers, (2) wrong dealer selected, or (3) fraud. Verify with both dealers."});
    } else if(seenByThisDealer){
      // Known account for this dealer - all good
      flags.push({level:"info",code:"KNOWN_ACCT",msg:"KNOWN ACCOUNT \u2014 " + ai.account + " seen " + acctHistory.length + " time(s) for " + (entry.cust||"?"),detail:"This account has deposited for " + (entry.cust||"this dealer") + " before. Trusted sender."});
    } else {
      // First time seeing this account at all
      flags.push({level:"warning",code:"NEW_ACCT",msg:"NEW ACCOUNT \u2014 " + ai.account + " (" + (ai.payer||"unknown") + ") never seen before",detail:"First time deposit from account " + ai.account + " (" + (ai.payer||"?") + "). Not previously associated with " + (entry.cust||"any dealer") + " or any other dealer. Verify sender identity."});
    }
  }
  // 8. WRONG RECIPIENT — check if money went to our account
  if(ai.recipient){
    var r = ai.recipient.toUpperCase();
    if(r.indexOf("COGNITIVE") < 0 && r.indexOf("CNC") < 0 && r.indexOf("CS TRADER") < 0 && r.indexOf("CSPL") < 0){
      flags.push({level:"critical",code:"WRONG_RECIP",msg:"WRONG RECIPIENT — " + ai.recipient,detail:"Money was sent to '" + ai.recipient + "' which does not match any company account (Cognitive Solutions / CNC / CS Traders / CSPL)."});
    }
  }
  
  // 9. OFF-HOURS DEPOSIT
  if(ai.time){
    var timeMatch = ai.time.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
    if(timeMatch){
      var hr = parseInt(timeMatch[1]);
      if(timeMatch[3] && timeMatch[3].toUpperCase() === "PM" && hr < 12) hr += 12;
      if(timeMatch[3] && timeMatch[3].toUpperCase() === "AM" && hr === 12) hr = 0;
      if(hr < 8 || hr > 20){
        flags.push({level:"info",code:"OFF_HOURS",msg:"OFF-HOURS — deposit at " + ai.time,detail:"Transaction made outside normal banking hours (8AM-8PM). Could be online transfer or suspicious."});
      }
    }
  }
  
  // 10. VELOCITY — too many from same submitter in 1 hour
  var recentCount = 0;
  var oneHourAgo = new Date(ts.getTime() - 3600000);
  allEntries.forEach(function(other){
    if(other.ts && new Date(other.ts) > oneHourAgo && new Date(other.ts) <= ts){
      recentCount++;
    }
  });
  if(recentCount > 5){
    flags.push({level:"warning",code:"HIGH_VELOCITY",msg:"HIGH VELOCITY — " + recentCount + " entries in last hour",detail:recentCount + " payment entries submitted within the same hour. Unusual pattern."});
  }
  
  // 12. NO EVIDENCE — no photo AND no text message
  if(!entry.photo && !entry.source_text){
    flags.push({level:"warning",code:"NO_EVIDENCE",msg:"NO EVIDENCE — no receipt photo or message",detail:"Salesperson submitted this payment without any supporting evidence (no photo, no pasted message). Cannot verify."});
  }
  
  // Sort: critical first, then warning, then info
  var order = {critical:0, warning:1, info:2};
  flags.sort(function(a,b){return (order[a.level]||9) - (order[b.level]||9)});
  
  return flags;
}

function renderFraudFlags(flags){
  if(!flags.length) return '<div style="padding:8px;background:#dcfce7;border:1px solid #86efac;border-radius:8px;text-align:center;font-size:12px;color:#16a34a;font-weight:600;margin:10px 0">NO FLAGS — All checks passed</div>';
  
  var h = '<div style="margin:10px 0">';
  h += '<div style="font-size:11px;font-weight:700;color:#111;margin-bottom:6px">RISK FLAGS (' + flags.length + ')</div>';
  flags.forEach(function(f){
    var bg = f.level==="critical"?"#fef2f2":f.level==="warning"?"#fffbeb":"#eff6ff";
    var bc = f.level==="critical"?"#fca5a5":f.level==="warning"?"#fcd34d":"#93c5fd";
    var tc = f.level==="critical"?"#dc2626":f.level==="warning"?"#d97706":"#2563eb";
    var icon = f.level==="critical"?"&#128308;":f.level==="warning"?"&#128992;":"&#128309;";
    h += '<div style="padding:8px 10px;background:'+bg+';border:1px solid '+bc+';border-radius:8px;margin-bottom:4px">';
    h += '<div style="font-size:12px;font-weight:700;color:'+tc+'">'+icon+' '+f.msg+'</div>';
    h += '<div style="font-size:10px;color:#666;margin-top:2px">'+f.detail+'</div>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function analyzeReceiptPhoto(idx){
  var key=pgSettings.claude_api_key||"";
  var pgRaw=[];try{pgRaw=JSON.parse(localStorage.getItem("pg_e")||"[]")}catch(e){return}
  var e=pgRaw[idx];if(!e||!e.photo)return;
  
  var resultDiv=document.getElementById("aiExtract_"+idx);
  if(resultDiv)resultDiv.innerHTML='<div style="text-align:center;padding:10px;color:#7c3aed;font-size:11px"><span class="ai-tag">ANALYZING...</span> Reading receipt photo...</div>';
  
  if(!key){
    // No API key - try regex on any text in the entry
    var text=(e.source_text||"")+" "+(e.note||"");
    var r=extractFromText(text);
    if(r.amount>0){
      pgRaw[idx].ai_extracted=r;
      try{localStorage.setItem("pg_e",JSON.stringify(pgRaw))}catch(ex){}
    }
    if(resultDiv)resultDiv.innerHTML='<div style="text-align:center;padding:10px;color:#f59e0b;font-size:11px">No Claude API key. Add in Reports → Settings for AI photo reading.</div>';
    return;
  }
  
  // Extract base64 from photo data URL
  var b64=e.photo;
  if(b64.indexOf(",")>0)b64=b64.split(",")[1];
  
  var msgs=[{role:"user",content:[
    {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
    {type:"text",text:"Extract ALL details from this bank transfer receipt/screenshot. Return ONLY JSON with these fields:\n{\"amount\": number, \"payer\": \"sender name\", \"account\": \"sender account number\", \"recipient\": \"receiving party name\", \"recipient_account\": \"receiving account\", \"bank\": \"bank name\", \"ref\": \"transaction ID/reference\", \"tid\": \"transaction ID\", \"date\": \"date\", \"time\": \"time\", \"branch\": \"branch if visible\"}\nReturn ONLY the JSON object, no explanation."}
  ]}];
  
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:msgs})
  }).then(function(r){return r.json()}).then(function(d){
    try{
      var txt=d.content[0].text;
      var ai=JSON.parse(txt.replace(/```json|```/g,"").trim());
      ai.confidence="high";ai.method="claude-vision";
      
      // Save to entry
      pgRaw[idx].ai_extracted=ai;
      pgRaw[idx].sender_account=ai.account||"";
      pgRaw[idx].sender_bank=ai.bank||"";
      try{localStorage.setItem("pg_e",JSON.stringify(pgRaw))}catch(ex){}
      
      // Re-open the review with updated data
      closeModal();
      showPaymentReview(idx);
    }catch(ex){
      if(resultDiv)resultDiv.innerHTML='<div style="color:#dc2626;font-size:11px">Could not parse AI response. Try again.</div>';
    }
  }).catch(function(err){
    if(resultDiv)resultDiv.innerHTML='<div style="color:#dc2626;font-size:11px">API error: '+err.message+'</div>';
  });
}

  var amt=Number(e.amt||0);var jid="JV-"+String(journals.length+1).padStart(4,"0");
  journals.push({id:jid,date:new Date().toISOString().slice(0,10),ref:e.id||"",nar:(e.cust||"Customer")+" - "+(e.typ||"payment")+" via PayGate",ent:ent,status:amt>100000?"pending":"posted",by:"accounts",lines:[{a:bk,d:amt,c:0,m:e.typ||"bank"},{a:rv,d:0,c:amt,m:e.cust||""}]});

function dlExcel(){
  if(typeof XLSX==="undefined"){alert("Excel library not loaded. Check internet connection.");return}
  var wb=XLSX.utils.book_new();
  var b=calc();var keys=Object.keys(b);
  var pgRaw=[];try{pgRaw=JSON.parse(localStorage.getItem("pg_e")||"[]")}catch(e){}
  
  // S1: Journal Entries
  var d1=[["Date","Ref","Narration","Entity","Account","Name","Debit","Credit","Status"]];
  journals.forEach(function(j){j.lines.forEach(function(l,i){d1.push([i?"":j.date,i?"":j.ref,i?"":j.nar,i?"":j.ent,l.a,AN(l.a),l.d||"",l.c||"",i?"":j.status])})});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d1),"Journal Entries");
  
  // S2: Trial Balance
  var d2=[["Code","Account","Debit","Credit"]];
  for(var i=0;i<keys.length;i++){var a=b[keys[i]];if(a.type!=="header"&&(a.dr||a.cr)){d2.push([a.code,a.name,a.normal==="debit"&&a.bal>0?a.bal:"",a.normal==="credit"&&a.bal>0?a.bal:""])}}
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d2),"Trial Balance");
  
  // S3: Incoming Payments (ALL fields)
  var d3=[["ID","Timestamp","Date","Time","Customer","Amount","Entity","Type","Note","Photo","Source Text","Sender Account","Sender Bank","Bank Verified","Verified At","Status","Journal ID","Approved By","Rejected","Rejection Category","Rejection Reason","AI Amount","AI Payer","AI Account","AI Bank","AI TID","AI Date"]];
  pgRaw.forEach(function(e){var ai=e.ai_extracted||{};d3.push([e.id||"",e.ts||"",e.date||"",e.time||"",e.cust||"",Number(e.amt||0),e.ent||"",e.typ||"",e.note||"",e.photo?"Yes":"No",e.source_text||"",e.sender_account||"",e.sender_bank||"",e.bank_verified?"Yes":"No",e.verified_at||"",e.journaled?"Posted":e.rejected?"Rejected":"Pending",e.journal_id||"",e.approved_by||"",e.rejected?"Yes":"No",e.rejection_category||"",e.rejection_reason||"",ai.amount||"",ai.payer||"",ai.account||"",ai.bank||"",ai.ref||ai.tid||"",ai.date||""])});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d3),"All Payments");
  
  // S4: Bank Balances
  var d4=[["Code","Bank","Balance"]];
  ["1101","1102","1103","1104","1105","1106","1107"].forEach(function(c){if(b[c])d4.push([c,b[c].name,Math.round(b[c].bal)])});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d4),"Bank Balances");
  
  // S5: Person Accounts
  var d5=[["Code","Name","Balance","Direction"]];
  COA.filter(function(a){return(a.type==="receivable"||a.type==="payable")&&b[a.code]&&b[a.code].bal}).forEach(function(a){d5.push([a.code,a.name,Math.round(b[a.code].bal),b[a.code].bal>0?"Owes Company":"Company Owes"])});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d5),"Person Accounts");
  
  // S6: Chart of Accounts
  var d6=[["Code","Name","Type","Normal","Balance"]];
  COA.forEach(function(a){d6.push([a.code,a.name,a.type,a.normal,b[a.code]?Math.round(b[a.code].bal):""])});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d6),"Chart of Accounts");
  
  // S7: Dealer Summary
  var dm={};pgRaw.forEach(function(e){var c=e.cust||"?";if(!dm[c])dm[c]={t:0,n:0,p:0,pn:0,r:0};dm[c].t+=Number(e.amt||0);dm[c].n++;if(e.journaled)dm[c].p++;else if(e.rejected)dm[c].r++;else dm[c].pn++});
  var d7=[["Dealer","Total","Payments","Posted","Pending","Rejected"]];
  Object.keys(dm).sort(function(a,b2){return dm[b2].t-dm[a].t}).forEach(function(d){var v=dm[d];d7.push([d,v.t,v.n,v.p,v.pn,v.r])});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d7),"Dealer Summary");
  
  // S8: Daily Summary
  var dy={};pgRaw.forEach(function(e){var d=(e.ts||"").slice(0,10);if(!d)return;if(!dy[d])dy[d]={n:0,t:0,p:0,pn:0,r:0,v:0};dy[d].n++;dy[d].t+=Number(e.amt||0);if(e.journaled)dy[d].p++;else if(e.rejected)dy[d].r++;else dy[d].pn++;if(e.bank_verified)dy[d].v++});
  var d8=[["Date","Entries","Total","Posted","Pending","Rejected","Bank Verified"]];
  Object.keys(dy).sort().reverse().forEach(function(d){var v=dy[d];d8.push([d,v.n,v.t,v.p,v.pn,v.r,v.v])});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d8),"Daily Summary");
  
  // S9: Fraud Flags
  var d9=[["Payment ID","Customer","Amount","Level","Code","Message"]];
  pgRaw.forEach(function(e,i){var ff=runFraudChecks(e,i,pgRaw);ff.forEach(function(f){d9.push([e.id||"",e.cust||"",Number(e.amt||0),f.level,f.code,f.msg])})});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d9),"Fraud Flags");
  
  // S10: Account Transactions
  var d10=[["Account","Name","Journal","Date","Narration","Entity","Debit","Credit"]];
  COA.filter(function(a){return a.type!=="header"}).forEach(function(ac){journals.filter(function(j){return j.status==="posted"}).forEach(function(j){j.lines.forEach(function(l){if(l.a===ac.code)d10.push([ac.code,ac.name,j.id,j.date,j.nar,j.ent,l.d||"",l.c||""])})})});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d10),"Account Transactions");
  
  // S11: P&L
  var d11=[["Category","Code","Account","Amount"]];var rv=0,cs=0,ex=0;
  keys.forEach(function(k){var a=b[k];if(a.code[0]==="4"&&a.type!=="header"&&a.bal){d11.push(["Revenue",a.code,a.name,a.bal]);rv+=a.bal}});
  keys.forEach(function(k){var a=b[k];if(a.code[0]==="5"&&a.type!=="header"&&a.bal){d11.push(["COGS",a.code,a.name,-a.bal]);cs+=a.bal}});
  keys.forEach(function(k){var a=b[k];if(a.code[0]==="6"&&a.type!=="header"&&a.bal){d11.push(["Expenses",a.code,a.name,-a.bal]);ex+=a.bal}});
  d11.push(["","","NET PROFIT",rv-cs-ex]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d11),"Profit & Loss");
  
  // S12: Balance Sheet
  var d12=[["Section","Code","Account","Amount"]];var tA=0,tL=0,tE=0;
  keys.forEach(function(k){var a=b[k];if(a.code[0]==="1"&&a.type!=="header"&&a.bal){d12.push(["Assets",a.code,a.name,Math.round(a.bal)]);tA+=a.bal}});
  d12.push(["","","TOTAL ASSETS",Math.round(tA)]);
  keys.forEach(function(k){var a=b[k];if(a.code[0]==="2"&&a.type!=="header"&&a.bal){d12.push(["Liabilities",a.code,a.name,Math.round(a.bal)]);tL+=a.bal}});
  keys.forEach(function(k){var a=b[k];if(a.code[0]==="3"&&a.type!=="header"&&a.bal){d12.push(["Equity",a.code,a.name,Math.round(a.bal)]);tE+=a.bal}});
  d12.push(["","","L+E",Math.round(tL+tE)]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d12),"Balance Sheet");
  
  XLSX.writeFile(wb,"PayGate_V13_"+new Date().toISOString().slice(0,10)+".xlsx");
}

var chatOpen=false;
function toggleChat(){chatOpen=!chatOpen;document.getElementById("chatPanel").style.display=chatOpen?"flex":"none";if(chatOpen)document.getElementById("chatInput").focus()}
function sendChat(){
  var inp=document.getElementById("chatInput");var q=inp.value.trim();if(!q)return;inp.value="";
  var body=document.getElementById("chatBody");
  body.innerHTML+='<div class="chat-msg user">'+q.replace(/</g,"&lt;")+'</div>';
  body.innerHTML+='<div class="chat-msg thinking" id="chatThinking">Thinking...</div>';
  body.scrollTop=body.scrollHeight;
  var pgRaw=[];try{pgRaw=JSON.parse(localStorage.getItem("pg_e")||"[]")}catch(e){}
  var context="PayGate AI for CNC/CST/CSPL.\n";var total=0,pending=0,verified=0,dealerTotals={};
  pgRaw.forEach(function(e){total+=Number(e.amt||0);if(e.journaled)verified++;else if(!e.rejected)pending++;var c=e.cust||"?";if(!dealerTotals[c])dealerTotals[c]=0;dealerTotals[c]+=Number(e.amt||0)});
  context+="Payments:"+pgRaw.length+" Total:PKR "+total.toLocaleString()+" Pending:"+pending+" Posted:"+verified+"\n";
  try{var b=calc();["1101","1102","1103","1104","1105","1106","1107"].forEach(function(code){if(b[code]&&b[code].bal)context+=b[code].name+":PKR "+Math.round(b[code].bal).toLocaleString()+" "})}catch(ex){}
  var key=pgSettings.claude_api_key||"";
  if(!key){var answer=localAnswer(q,pgRaw,dealerTotals,total,pending,verified);document.getElementById("chatThinking").remove();body.innerHTML+='<div class="chat-msg bot">'+answer+'</div>';body.scrollTop=body.scrollHeight;return}
  fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,system:context,messages:[{role:"user",content:q}]})}).then(function(r){return r.json()}).then(function(d){var reply=d.content&&d.content[0]?d.content[0].text:"No response.";document.getElementById("chatThinking").remove();body.innerHTML+='<div class="chat-msg bot">'+reply.replace(/</g,"&lt;").replace(/\n/g,"<br>")+'</div>';body.scrollTop=body.scrollHeight}).catch(function(err){document.getElementById("chatThinking").remove();body.innerHTML+='<div class="chat-msg bot" style="color:#dc2626">Error</div>'});
}
function localAnswer(q,entries,dealers,total,pending,posted){
  var ql=q.toLowerCase();
  if(ql.indexOf("total")>=0){for(var d in dealers){if(ql.indexOf(d.toLowerCase())>=0)return d+": <b>PKR "+dealers[d].toLocaleString()+"</b>"}return"Total: <b>PKR "+total.toLocaleString()+"</b> ("+entries.length+" entries)"}
  if(ql.indexOf("pending")>=0)return pending+" pending.";
  if(ql.indexOf("balance")>=0||ql.indexOf("bank")>=0){try{var b=calc();var ans="";["1101","1102","1103","1104","1105","1106","1107"].forEach(function(c){if(b[c]&&b[c].bal)ans+=b[c].name+": PKR "+Math.round(b[c].bal).toLocaleString()+"<br>"});return ans||"No data"}catch(e){return"Error"}}
  return"Try: totals, pending, bank balances, or dealer names. Add Claude API key for smarter answers.";
}
