<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif; background:#0c0f14; color:#e2e8f0; min-height:100vh; min-height:100dvh; overflow-x:hidden; }
input,select,button,textarea { font-family:inherit; }

/* Header */
.header { background:linear-gradient(135deg,#0f172a,#1a0f2e); padding:max(env(safe-area-inset-top),12px) 16px 12px; border-bottom:1px solid #ffffff10; position:sticky; top:0; z-index:50; }
.header h1 { font-size:18px; font-weight:800; color:#f8fafc; letter-spacing:-0.03em; }
.header .sub { font-size:11px; color:#8b5cf6; }

/* Form */
.form-card { margin:16px; border-radius:16px; background:#1e293b; border:1px solid #334155; overflow:hidden; }
.form-section { padding:16px; }
.form-section + .form-section { border-top:1px solid #334155; }
.label { font-size:12px; font-weight:600; color:#94a3b8; margin-bottom:8px; display:block; text-transform:uppercase; letter-spacing:0.05em; }

/* Customer Input */
.search-wrap { position:relative; }
.search-input { width:100%; padding:14px 16px; border-radius:12px; border:2px solid #334155; background:#0f172a; color:#f8fafc; font-size:16px; outline:none; transition:border 0.2s; }
.search-input:focus { border-color:#8b5cf6; }
.search-input::placeholder { color:#475569; }
.dropdown { position:absolute; top:100%; left:0; right:0; background:#1e293b; border:1px solid #475569; border-radius:12px; margin-top:4px; max-height:240px; overflow-y:auto; z-index:100; box-shadow:0 20px 40px rgba(0,0,0,0.5); }
.dropdown-item { padding:12px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; border-bottom:1px solid #334155; }
.dropdown-item:last-child { border-bottom:none; }
.dropdown-item:active { background:#334155; }
.dropdown-item .name { font-size:14px; font-weight:500; color:#f8fafc; }
.dropdown-item .tag { font-size:10px; padding:2px 8px; border-radius:6px; font-weight:700; }
.tag-CNC { background:#ef444420; color:#f87171; }
.tag-CST { background:#3b82f620; color:#60a5fa; }
.tag-CSPL { background:#22c55e20; color:#4ade80; }
.tag-L { background:#f59e0b20; color:#fbbf24; font-size:9px; margin-left:6px; }

/* Amount Input */
.amount-wrap { position:relative; }
.amount-input { width:100%; padding:14px 16px 14px 50px; border-radius:12px; border:2px solid #334155; background:#0f172a; color:#f8fafc; font-size:24px; font-weight:700; font-family:'SF Mono',monospace; outline:none; transition:border 0.2s; }
.amount-input:focus { border-color:#16a34a; }
.amount-prefix { position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:14px; color:#64748b; font-weight:600; }

/* Entity Selector */
.entity-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.entity-btn { padding:14px 8px; border-radius:12px; border:2px solid #334155; background:#0f172a; color:#64748b; font-size:13px; font-weight:700; text-align:center; cursor:pointer; transition:all 0.2s; }
.entity-btn.active-CNC { border-color:#ef4444; background:#ef444415; color:#f87171; }
.entity-btn.active-CST { border-color:#3b82f6; background:#3b82f615; color:#60a5fa; }
.entity-btn.active-CSPL { border-color:#22c55e; background:#22c55e15; color:#4ade80; }

/* Type Selector */
.type-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.type-btn { padding:12px 8px; border-radius:12px; border:2px solid #334155; background:#0f172a; color:#64748b; font-size:12px; font-weight:600; text-align:center; cursor:pointer; transition:all 0.2s; }
.type-btn.active { border-color:#8b5cf6; background:#8b5cf615; color:#a78bfa; }

/* Submit */
.submit-btn { width:100%; padding:16px; border-radius:12px; border:none; font-size:16px; font-weight:700; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
.submit-btn.ready { background:linear-gradient(135deg,#16a34a,#059669); color:white; box-shadow:0 0 30px #16a34a40; }
.submit-btn.disabled { background:#1e293b; color:#475569; }

/* Success */
.success-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:200; animation:fadeIn 0.3s; }
.success-card { background:#0f172a; border:2px solid #16a34a; border-radius:20px; padding:40px 30px; text-align:center; max-width:320px; animation:scaleIn 0.3s; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes scaleIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }

/* Recent entries */
.recent { margin:16px; }
.recent-title { font-size:12px; font-weight:600; color:#64748b; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.05em; }
.recent-item { padding:12px; background:#1e293b; border-radius:10px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; border:1px solid #334155; }
.recent-item .left .cust { font-size:13px; font-weight:600; color:#f8fafc; }
.recent-item .left .meta { font-size:11px; color:#64748b; margin-top:2px; }
.recent-item .amt { font-size:16px; font-weight:800; color:#4ade80; font-family:'SF Mono',monospace; }
.recent-item .amt.out { color:#f87171; }

/* Bottom Nav */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:#0f172a; border-top:1px solid #1e293b; display:flex; padding:8px 0 max(env(safe-area-inset-bottom),8px); z-index:50; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; color:#475569; font-size:10px; font-weight:600; cursor:pointer; border:none; background:none; }
.nav-btn.active { color:#8b5cf6; }
.nav-btn svg { width:20px; height:20px; }
</style>

// State
let state = {
  screen: 'entry', // entry, history, settings
  customer: '',
  customerEntity: '',
  customerType: 'D',
  amount: '',
  entity: '',
  type: 'ledger',
  note: '',
  showDropdown: false,
  filtered: [],
  entries: JSON.parse(localStorage.getItem('pg_entries') || '[]'),
  success: null,
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function PKR(v) {
  return v ? 'PKR ' + Number(v).toLocaleString('en-PK') : '—';
}

function filterCustomers(q) {
  if (!q || q.length < 1) return [];
  const ql = q.toLowerCase();
  return CUSTS.filter(c => c.n.toLowerCase().includes(ql)).slice(0, 12);
}

function selectCustomer(c) {
  setState({
    customer: c.n,
    customerEntity: c.e,
    customerType: c.t,
    entity: c.e || state.entity,
    type: c.t === 'L' ? 'ledger' : 'dispatch',
    showDropdown: false,
    filtered: [],
  });
}

function submit() {
  if (!state.customer || !state.amount || !state.entity) return;
  const entry = {
    id: 'PG-' + Date.now(),
    customer: state.customer,
    amount: parseFloat(state.amount),
    entity: state.entity,
    type: state.type,
    note: state.note,
    timestamp: new Date().toISOString(),
    date: new Date().toLocaleDateString('en-PK'),
    time: new Date().toLocaleTimeString('en-PK', {hour:'2-digit',minute:'2-digit'}),
    synced: false,
  };
  state.entries.unshift(entry);
  localStorage.setItem('pg_entries', JSON.stringify(state.entries));
  
  setState({
    success: entry,
    customer: '', customerEntity: '', customerType: 'D',
    amount: '', note: '', type: 'ledger',
  });
  
  setTimeout(() => setState({ success: null }), 2500);
}

function render() {
  const app = document.getElementById('app');
  
  if (state.screen === 'entry') {
    app.innerHTML = renderEntry();
  } else if (state.screen === 'history') {
    app.innerHTML = renderHistory();
  }
  
  if (state.success) {
    app.innerHTML += renderSuccess();
  }
  
  // Attach events after render
  setTimeout(attachEvents, 0);
}

  const canSubmit = state.customer && state.amount && state.entity;

    <div class="bottom-nav">
      <div class="nav-btn" data-screen="entry">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Entry
      </div>
      <div class="nav-btn active" data-screen="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        History
      </div>
    </div>
  `;
}

function renderSuccess() {
  const e = state.success;
  return `
    <div class="success-overlay" id="successOverlay">
      <div class="success-card">
        <div style="font-size:48px;margin-bottom:12px">✅</div>
        <div style="font-size:18px;font-weight:700;color:#4ade80;margin-bottom:8px">Payment Recorded!</div>
        <div style="font-size:14px;color:#e2e8f0;font-weight:600">${e.customer}</div>
        <div style="font-size:28px;font-weight:800;color:#f8fafc;margin:8px 0;font-family:monospace">${PKR(e.amount)}</div>
        <div style="font-size:12px;color:#94a3b8">${e.entity} · ${e.type} · ${e.time}</div>
        <div style="margin-top:16px;padding:8px 16px;border-radius:8px;background:#16a34a15;border:1px solid #16a34a30;font-size:11px;color:#4ade80">
          ${e.type === 'dispatch' ? '📦 Queued for dispatch confirmation' : '📒 Ledger credit recorded'}
        </div>
      </div>
    </div>
  `;
}

function attachEvents() {
  // Customer input
  const ci = document.getElementById('custInput');
  if (ci) {
    ci.oninput = (e) => {
      const val = e.target.value;
      const filtered = filterCustomers(val);
      setState({ customer: val, filtered, showDropdown: filtered.length > 0 && val.length >= 1 });
      // Re-focus after render
      setTimeout(() => {
        const inp = document.getElementById('custInput');
        if (inp) { inp.focus(); inp.setSelectionRange(val.length, val.length); }
      }, 0);
    };
    ci.onblur = () => setTimeout(() => setState({ showDropdown: false }), 200);
    ci.onfocus = () => {
      if (state.customer.length >= 1) {
        setState({ filtered: filterCustomers(state.customer), showDropdown: true });
      }
    };
  }

  // Dropdown items
  document.querySelectorAll('.dropdown-item').forEach(el => {
    el.onmousedown = (e) => { e.preventDefault(); selectCustomer(state.filtered[el.dataset.cidx]); };
    el.ontouchstart = (e) => { selectCustomer(state.filtered[el.dataset.cidx]); };
  });

  // Amount input
  const ai = document.getElementById('amtInput');
  if (ai) ai.oninput = (e) => setState({ amount: e.target.value });

  // Note input
  const ni = document.getElementById('noteInput');
  if (ni) ni.oninput = (e) => setState({ note: e.target.value });

  // Entity buttons
  document.querySelectorAll('[data-entity]').forEach(el => {
    el.onclick = () => setState({ entity: el.dataset.entity });
  });

  // Type buttons
  document.querySelectorAll('[data-type]').forEach(el => {
    el.onclick = () => setState({ type: el.dataset.type });
  });

  // Submit
  const sb = document.getElementById('submitBtn');
  if (sb) sb.onclick = submit;

  // Nav
  document.querySelectorAll('[data-screen]').forEach(el => {
    el.onclick = () => setState({ screen: el.dataset.screen });
  });

  // Success overlay dismiss
  const so = document.getElementById('successOverlay');
  if (so) so.onclick = () => setState({ success: null });
}

// Initial render
render();
</script>
</body>
</html>
