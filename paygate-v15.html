<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:#0c0f14;color:#e2e8f0;height:100%;overflow:hidden;position:fixed;width:100%;touch-action:manipulation}
input,select,button,textarea{font-family:inherit;-webkit-appearance:none}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.header{background:linear-gradient(135deg,#0f172a,#1a0f2e);padding:max(env(safe-area-inset-top),8px) 16px 10px;border-bottom:1px solid #ffffff10;flex-shrink:0}
.header-row{display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:17px;font-weight:800;color:#f8fafc;letter-spacing:-0.02em}
.header .sub{font-size:10px;color:#8b5cf6;margin-top:1px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.status-dot.on{background:#4ade80;box-shadow:0 0 6px #4ade80}
.status-dot.off{background:#f87171}
.status-text{font-size:10px;color:#64748b}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:70px}

.bnav{position:fixed;bottom:0;left:0;right:0;background:#0f172a;border-top:1px solid #1e293b;display:flex;padding:6px 0 max(env(safe-area-inset-bottom),6px);z-index:50}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;color:#475569;font-size:9px;font-weight:600;cursor:pointer;border:none;background:none}
.nb.act{color:#8b5cf6}
.nb svg{width:20px;height:20px}

/* Cards */
.card{margin:10px 14px;border-radius:12px;background:#1e293b;border:1px solid #334155;overflow:hidden}
.sec{padding:12px 14px}
.sec+.sec{border-top:1px solid #ffffff08}
.lbl{font-size:10px;font-weight:700;color:#64748b;margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.06em}

/* Inputs */
.inp{width:100%;padding:11px 12px;border-radius:10px;border:2px solid #334155;background:#0f172a;color:#f8fafc;font-size:16px;outline:none;transition:border .2s}
.inp:focus{border-color:#8b5cf6}
.inp::placeholder{color:#475569}

/* Autocomplete dropdown */
.dd{position:absolute;top:100%;left:0;right:0;background:#1e293b;border:1px solid #475569;border-radius:10px;margin-top:3px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 12px 30px rgba(0,0,0,.6)}
.ddi{padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #33415540}
.ddi:last-child{border-bottom:none}
.ddi:active{background:#334155}
.ddi .nm{font-size:14px;font-weight:500;color:#f8fafc}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
.tC{background:#ef444420;color:#f87171}
.tS{background:#3b82f620;color:#60a5fa}
.tP{background:#22c55e20;color:#4ade80}
.tD{background:#f59e0b20;color:#fbbf24;margin-left:4px}

/* Amount */
.aw{position:relative}
.ai{width:100%;padding:11px 12px 11px 40px;border-radius:10px;border:2px solid #334155;background:#0f172a;color:#f8fafc;font-size:22px;font-weight:700;font-family:'SF Mono',ui-monospace,monospace;outline:none;transition:border .2s}
.ai:focus{border-color:#16a34a}
.ap{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:#64748b;font-weight:600}

/* Grid buttons */
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.gb{padding:11px 6px;border-radius:10px;border:2px solid #334155;background:#0f172a;color:#64748b;font-size:12px;font-weight:700;text-align:center;cursor:pointer;transition:all .15s}
.gb:active{transform:scale(0.97)}
.gb.aC{border-color:#ef4444;background:#ef444412;color:#f87171}
.gb.aS{border-color:#3b82f6;background:#3b82f612;color:#60a5fa}
.gb.aP{border-color:#22c55e;background:#22c55e12;color:#4ade80}
.gb.at{border-color:#8b5cf6;background:#8b5cf612;color:#a78bfa}

/* Photo */
.photo-box{border:2px dashed #334155;border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.photo-box:active{border-color:#8b5cf6;background:#8b5cf608}
.photo-box.has{border-style:solid;border-color:#16a34a;padding:4px}
.photo-box .ph-icon{font-size:24px}
.photo-box .ph-text{font-size:11px;color:#475569}
.photo-box img{width:100%;max-height:160px;object-fit:cover;border-radius:8px}
.photo-box .ph-remove{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:#dc2626;color:white;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Submit */
.sbtn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.sbtn.rdy{background:linear-gradient(135deg,#16a34a,#059669);color:white;box-shadow:0 0 24px #16a34a30}
.sbtn.rdy:active{transform:scale(0.98)}
.sbtn.dis{background:#1e293b;color:#475569}

/* Success overlay */
.sov{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;animation:fi .25s}
.scd{background:#0f172a;border:2px solid #16a34a;border-radius:18px;padding:32px 24px;text-align:center;max-width:300px;width:90%;animation:si .25s}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes si{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}

/* History items */
.hi{padding:10px 12px;background:#1e293b;border-radius:10px;margin:0 14px 6px;display:flex;align-items:center;gap:10px;border:1px solid #334155}
.hi .thumb{width:40px;height:40px;border-radius:8px;background:#334155;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:#475569}
.hi .thumb img{width:100%;height:100%;object-fit:cover}
.hi .info{flex:1;min-width:0}
.hi .info .cn{font-size:13px;font-weight:600;color:#f8fafc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi .info .mt{font-size:10px;color:#64748b;margin-top:1px}
.hi .am{font-size:15px;font-weight:800;font-family:'SF Mono',monospace;white-space:nowrap}
.hi .am.in{color:#4ade80}
.hi .am.out{color:#f87171}

/* Summary cards */
.srow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 14px}
.scard{padding:12px;border-radius:10px;background:#1e293b;border:1px solid #334155}
.scard .sv{font-size:20px;font-weight:800;color:#f8fafc;font-family:'SF Mono',monospace}
.scard .sl{font-size:10px;color:#64748b;margin-top:2px;text-transform:uppercase;font-weight:600;letter-spacing:.04em}

.empty-state{text-align:center;padding:50px 30px;color:#475569}
.empty-state .ei{font-size:40px;margin-bottom:10px;display:block}

.ftag{padding:5px 10px;border-radius:8px;font-size:10px;font-weight:600;color:#64748b;background:#1e293b;border:1px solid #334155;cursor:pointer;white-space:nowrap;transition:all .15s}
.ftag:active{transform:scale(.96)}
.ftag.factive{color:#a78bfa;border-color:#8b5cf6;background:#8b5cf612}
</style>
</head>

  hFiltEnt: null, hFiltTyp: null, hFiltDate: null, hSearch: '',

  suc: null,

// Detail viewer
function showDetail(id) {
  const e = S.entries.find(x => x.id === id);
  if (!e) return;
  S.detailEntry = e;
  render();
}

function closeDetail() {
  S.detailEntry = null;
  render();
}

function renderDetail() {
  const e = S.detailEntry;
  if (!e) return '';
  const entColor = e.ent==='CNC'?'#f87171':e.ent==='CST'?'#60a5fa':'#4ade80';

  return `
    <div class="sov" onclick="closeDetail()">
      <div class="scd" onclick="event.stopPropagation()" style="max-width:340px;width:92%;padding:20px 16px;max-height:85vh;overflow-y:auto">

function init() {
  try { S.entries = JSON.parse(localStorage.getItem('pg_e') || '[]'); } catch(e) { S.entries = []; }
  render();
}

function set(u) { 
  // Preserve input values before re-render
  const ci = document.getElementById('ci');
  const ai = document.getElementById('ai');
  const ni = document.getElementById('ni');
  if (ci) S.cust = ci.value;
  if (ai) S.amt = ai.value;
  if (ni) S.note = ni.value;
  var bm = document.getElementById('bankMsg');
  if (bm) S.bankMsg = bm.value;
  Object.assign(S, u); 
  render(); 
}

function PKR(v) { return v ? 'PKR ' + Number(v).toLocaleString('en-PK') : '—'; }

function filt(q) {
  if (!q || q.length < 1) return [];
  const l = q.toLowerCase();
  return CUSTS.filter(c => c.n.toLowerCase().includes(l)).slice(0, 10);
}

function selCust(c) {
  set({ cust: c.n, cEnt: c.e, cType: c.t, ent: c.e || S.ent, typ: c.t === 'L' ? 'ledger' : 'dispatch', dd: false, fl: [] });
}

  inp.type = 'file';
  inp.accept = 'image/*,.jpg,.jpeg,.png,.heic,.heif,.webp';
  // No capture attribute = shows choice: Camera OR Photo Library on iPhone
  inp.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    // Compress image
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = h * MAX / w; w = MAX; }
          else { w = w * MAX / h; h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.6);
        set({ photo: compressed, photoThumb: compressed });
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function removePhoto() { set({ photo: null, photoThumb: null }); }

// ── Submit ──
function submit() {
  // Grab latest values from DOM in case state is stale
  const ciEl = document.getElementById('ci');
  const aiEl = document.getElementById('ai');
  const niEl = document.getElementById('ni');
  if (ciEl) S.cust = ciEl.value;
  if (aiEl) S.amt = aiEl.value;
  if (niEl) S.note = niEl.value;
  if (!S.cust || !S.amt || !S.ent) return;
  const now = new Date();
  const entry = {
    id: 'PG-' + Date.now(),
    cust: S.cust,
    amt: parseFloat(S.amt),
    ent: S.ent,
    typ: S.typ,
    note: S.note,
    source_text: S.bankMsg || '',
    bankMsg: S.bankMsg || '',
    photo: S.photoThumb,
    ts: now.toISOString(),
    date: now.toLocaleDateString('en-GB', {day:'2-digit',month:'short'}),
    time: now.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',hour12:true}),
    sync: false,
  };
  S.entries.unshift(entry);
  try { localStorage.setItem('pg_e', JSON.stringify(S.entries.slice(0, 500))); } catch(e) {}
  
  // TODO: Firebase push here
  // firebase.database().ref('payments').push(entry);
  
  set({
    suc: entry,
    cust: '', cEnt: '', cType: 'D', amt: '', note: '', bankMsg: '', bankMsg: '', typ: 'ledger',
    photo: null, photoThumb: null,
  });
  setTimeout(() => set({ suc: null }), 2200);
}

// ── Helpers ──
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function highlight(name, query) {
  if (!query) return esc(name);
  const idx = name.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return esc(name);
  return esc(name.slice(0,idx)) + '<strong style="color:#fbbf24">' + esc(name.slice(idx, idx+query.length)) + '</strong>' + esc(name.slice(idx+query.length));
}

// ── Event Binding ──
function attachEvents() {
  const ci = document.getElementById('ci');
  if (ci) {
    ci.addEventListener('input', (e) => {
      const v = e.target.value;
      S.cust = v;
      S.fl = filt(v);
      S.dd = S.fl.length > 0 && v.length >= 1;
      // Update dropdown without full re-render
      const oldDd = ci.parentElement.querySelector('.dd');
      if (oldDd) oldDd.remove();
      if (S.dd) {
        const ddEl = document.createElement('div');
        ddEl.className = 'dd';
        ddEl.innerHTML = S.fl.map((c,i) => '<div class="ddi" data-ci="'+i+'"><div><span class="nm">'+highlight(c.n,S.cust)+'</span>'+(c.t==='L'?'<span class="tag tD">DEALER</span>':'')+'</div>'+(c.e?'<span class="tag t'+c.e[0]+'">'+c.e+'</span>':'')+'</div>').join('');
        ci.parentElement.appendChild(ddEl);
        ddEl.querySelectorAll('[data-ci]').forEach(el => {
          el.addEventListener('mousedown', (ev) => { ev.preventDefault(); selCust(S.fl[parseInt(el.dataset.ci)]); });
          el.addEventListener('touchstart', (ev) => { ev.preventDefault(); selCust(S.fl[parseInt(el.dataset.ci)]); }, {passive:false});
        });
      }
    });
    ci.addEventListener('focus', () => {
      if (S.cust.length >= 1) { 
        S.fl = filt(S.cust); 
        S.dd = S.fl.length > 0;
        // Show dropdown without re-render
        const oldDd = ci.parentElement.querySelector('.dd');
        if (oldDd) oldDd.remove();
        if (S.dd) {
          const ddEl = document.createElement('div');
          ddEl.className = 'dd';
          ddEl.innerHTML = S.fl.map((c,i) => '<div class="ddi" data-ci="'+i+'"><div><span class="nm">'+highlight(c.n,S.cust)+'</span>'+(c.t==='L'?'<span class="tag tD">DEALER</span>':'')+'</div>'+(c.e?'<span class="tag t'+c.e[0]+'">'+c.e+'</span>':'')+'</div>').join('');
          ci.parentElement.appendChild(ddEl);
          ddEl.querySelectorAll('[data-ci]').forEach(el => {
            el.addEventListener('mousedown', (ev) => { ev.preventDefault(); selCust(S.fl[parseInt(el.dataset.ci)]); });
            el.addEventListener('touchstart', (ev) => { ev.preventDefault(); selCust(S.fl[parseInt(el.dataset.ci)]); }, {passive:false});
          });
        }
      }
    });
    ci.addEventListener('blur', () => { setTimeout(() => { S.dd = false; const dd = document.querySelector('.dd'); if (dd) dd.remove(); }, 150); });
  }
  
  // Dropdown items
  document.querySelectorAll('[data-ci]').forEach(el => {
    el.addEventListener('mousedown', (e) => { e.preventDefault(); selCust(S.fl[parseInt(el.dataset.ci)]); });
    el.addEventListener('touchstart', (e) => { e.preventDefault(); selCust(S.fl[parseInt(el.dataset.ci)]); }, {passive:false});
  });
  
  const ai = document.getElementById('ai');
  if (ai) ai.addEventListener('input', (e) => { 
    S.amt = e.target.value;
    // Update PKR display without re-render
    const pkrDiv = ai.parentElement.nextElementSibling;
    if (pkrDiv && pkrDiv.style) {
      if (S.amt) { pkrDiv.textContent = PKR(S.amt); pkrDiv.style.display = ''; }
      else { pkrDiv.style.display = 'none'; }
    }
  });
  
  const ni = document.getElementById('ni');
  if (ni) ni.addEventListener('input', (e) => { S.note = e.target.value; /* no re-render for note */ });
  
  const sb = document.getElementById('sb');
  if (sb) sb.addEventListener('click', submit);
  
  // History search
  const hs = document.getElementById('hsearch');
  if (hs) {
    hs.addEventListener('input', (e) => { S.hSearch = e.target.value; render(); setTimeout(() => { const el = document.getElementById('hsearch'); if(el){el.focus();el.setSelectionRange(S.hSearch.length,S.hSearch.length)} },20); });
  }
  
  // Photo
  const pb = document.getElementById('pbox');
  if (pb && !S.photo) pb.addEventListener('click', triggerPhoto);
  const pr = document.getElementById('prm');
  if (pr) pr.addEventListener('click', (e) => { e.stopPropagation(); removePhoto(); });
}
